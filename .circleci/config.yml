version: 2.1

orbs:
  docker: circleci/docker@2.4.0

jobs:
  train-and-deploy:
    docker:
      - image: cimg/python:3.9.25
    steps:
      - checkout

      # Step 1: Install dependencies and run your ML pipeline
      - run:
          name: Install Dependencies and Run Training Pipeline
          command: |
            python -m pip install --upgrade pip
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
            pip install -e .
            python pipeline/training_pipeline.py

      # STEP 2: ENABLE REMOTE DOCKER ENGINE (This fixes the daemon connection error)
      - setup_remote_docker:
          version: 20.10.24  # Specifies a secure, stable version of the remote Docker daemon

      # Step 3: Authenticate, Build, and Push the Docker Image using the Orb
      - docker/check:
          registry: docker.io
      - docker/build:
          image: $DOCKERHUB_USERNAME/australian-rain-prediction
          tag: "latest,$CIRCLE_SHA1"
      - docker/push:
          image: $DOCKERHUB_USERNAME/australian-rain-prediction
          tag: "latest,$CIRCLE_SHA1"

workflows:
  version: 2
  mlops-pipeline:
    jobs:
      - train-and-deploy:
          filters:
            branches:
              only: main